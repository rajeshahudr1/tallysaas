; Tally Cloud Sync Agent — example configuration.
; The agent writes config.ini itself during Setup; this file documents the
; non-secret keys. The [state] section is managed by the agent (do not edit).
;
; HIDDEN/BAKED: the server URL is compiled INTO the exe (constants.API_BASE_URL)
; and is NEVER read from or written to config.ini - there is no api_url here.
;
; ENCRYPTED: the license key and agent token are stored machine-bound and
; ENCRYPTED under obfuscated keys (cred_k in [agent], cred_t in [state]) - never
; in plaintext. They cannot be decrypted on a different PC.

[agent]
; (license_key is stored encrypted as cred_k by the agent - do not set it here.)
; Seconds between sync passes.
sync_interval=60
; Logging level: DEBUG, INFO, WARNING, ERROR.
log_level=INFO
; Reported agent version.
agent_version=1.2.8

; ── Auto-update (the agent replaces its own exe when the server publishes a
;    newer one). The CLOUD per-license toggle overrides auto_update when set.
; Master on/off for self-update (on/off). A MANDATORY (security) release still
; applies even when this is off.
auto_update=on
; Check for a new exe once at startup, then every N loop cycles (~N minutes at
; the default 60s sync_interval).
update_check_cycles=30
; Only ask before updating when running in a real terminal (interactive). A
; headless/background run always applies automatically. (on/off)
confirm_updates=off

[tally]
; Tally HTTP/XML gateway URL (Gateway of Tally > F1 > Connectivity, port 9000).
tally_url=http://localhost:9000
; Auto-start Tally when it is closed (the agent launches it + waits for :9000).
auto_start=true
; Full path to tally.exe. Leave blank to auto-detect (standard install folders
; + Windows registry); set it if Tally is installed somewhere non-standard,
; e.g.  tally_exe=D:\Database Path\Other software\TallyPrime\tally.exe
tally_exe=

[tally_ui]
; UI-automation fallback used to OPEN a company when the clean method
; (rewriting tally.ini Load= + restart) does NOT work — most notably on the
; EDUCATIONAL edition of Tally Prime, which IGNORES the tally.ini Load= line.
;
; select_company_keys is a keystroke SEQUENCE the agent sends to the focused
; Tally window to drive its "Select / Open Company" screen and type the company
; name. Tokens are separated by spaces:
;   ESC ENTER UP DOWN TAB        - those keys
;   F1 .. F12                    - function keys
;   ALT+F3  CTRL+ENTER  ...      - a '+' combo holds the modifier(s)
;   DELAY:800                    - pause 800 milliseconds (let a screen draw)
;   TYPE:{name}                  - type the company name (substituted at run time)
;
; IMPORTANT: the EXACT keys depend on your Tally Prime version/build and on which
; screen Tally is sitting on, so this DEFAULT is a best-effort starting point and
; may need tuning for your install. The default below: press ESC a few times to
; fall back to the Gateway of Tally, open the Company menu (ALT+F3), choose
; "Select Company" (its accelerator is usually 'S'), wait for the picker, type
; the company name, and confirm with ENTER.
select_company_keys=ESC DELAY:400 ESC DELAY:400 ALT+F3 DELAY:800 TYPE:S DELAY:800 TYPE:{name} DELAY:800 ENTER

[state]
; Populated automatically after activation:
; cred_t=    (the agent token, ENCRYPTED + machine-bound)
; machine_id=
