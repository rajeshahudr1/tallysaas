; Tally Cloud Sync Agent — example configuration.
; Copy this file to config.ini and fill in your license_key.
; The [state] section is managed by the agent (do not edit by hand).

[agent]
; Base URL of the cloud API.
api_url=http://localhost:4500/api/v1
; Secret license key issued for this customer (machine-bound on activation).
license_key=
; Seconds between sync passes.
sync_interval=60
; Logging level: DEBUG, INFO, WARNING, ERROR.
log_level=INFO
; Reported agent version.
agent_version=1.0.0

[tally]
; Tally HTTP/XML gateway URL (Gateway of Tally > F1 > Connectivity, port 9000).
tally_url=http://localhost:9000
; Auto-start Tally when it is closed (the agent launches it + waits for :9000).
auto_start=true
; Full path to tally.exe. Leave blank to auto-detect (standard install folders
; + Windows registry); set it if Tally is installed somewhere non-standard,
; e.g.  tally_exe=D:\Database Path\Other software\TallyPrime\tally.exe
tally_exe=

[state]
; Populated automatically after activation:
; agent_token=
; machine_id=
